name: Lint PR

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - ready_for_review

jobs:
  main:
    name: Validate PR title
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          scopes: |
            airflow
            datasets
            docker
            telemetry
            all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
